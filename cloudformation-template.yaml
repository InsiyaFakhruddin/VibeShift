AWSTemplateFormatVersion: '2010-09-09'
Description: 'VibeShift MusicGen Deployment on AWS - GPU-enabled API'

Parameters:
  KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: EC2 Key Pair for SSH access
  
  InstanceType:
    Type: String
    Default: g4dn.xlarge
    AllowedValues:
      - g4dn.xlarge
      - g4dn.2xlarge
      - g3.4xlarge
      - g3.8xlarge
    Description: GPU instance type
  
  VolumeSize:
    Type: Number
    Default: 100
    MinValue: 50
    MaxValue: 500
    Description: Root volume size in GB

  EnvironmentName:
    Type: String
    Default: production
    AllowedValues:
      - development
      - staging
      - production
    Description: Environment name

Mappings:
  RegionAMI:
    us-east-1:
      AMI: ami-0c02fb55db3c27f89
    us-west-2:
      AMI: ami-0a8e758f5e873d1c1
    eu-west-1:
      AMI: ami-0d71ea30463e0ff8d

Resources:
  # ─────────────────────────────────────────────────────────────────────────
  # Security Groups
  # ─────────────────────────────────────────────────────────────────────────

  APISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for VibeShift MusicGen API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: FastAPI access
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: SSH access
      Tags:
        - Key: Name
          Value: !Sub 'vibeshift-api-sg-${EnvironmentName}'

  # ─────────────────────────────────────────────────────────────────────────
  # IAM Role for EC2
  # ─────────────────────────────────────────────────────────────────────────

  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub 'arn:aws:s3:::vibeshift-*'
                  - !Sub 'arn:aws:s3:::vibeshift-*/*'

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2InstanceRole

  # ─────────────────────────────────────────────────────────────────────────
  # EC2 Instance
  # ─────────────────────────────────────────────────────────────────────────

  VibeShiftAPI:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !FindInMap [RegionAMI, !Ref 'AWS::Region', AMI]
      InstanceType: !Ref InstanceType
      KeyName: !Ref KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroupIds:
        - !Ref APISecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: !Ref VolumeSize
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e
          
          # Update system
          apt-get update
          apt-get upgrade -y
          
          # Install Docker
          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ubuntu
          
          # Install NVIDIA Docker runtime
          apt-get install -y nvidia-container-runtime
          
          # Verify GPU
          nvidia-smi
          
          # Create directories
          mkdir -p /data/models
          mkdir -p /data/outputs
          chown -R ubuntu:ubuntu /data
          
          # Log startup
          echo "Instance initialization started" > /var/log/vibeshift-startup.log
          
          # Add instructions
          cat > /tmp/DEPLOYMENT_NOTES.txt << 'EOF'
          ============================================
          VibeShift MusicGen API Deployment
          ============================================
          
          Next steps:
          1. SSH into this instance
          2. Run: bash /tmp/setup.sh
          3. Set ECR_IMAGE environment variable
          4. Run: docker pull $ECR_IMAGE
          5. Run: docker run --gpus all -p 8000:8000 $ECR_IMAGE
          
          Access API at:
          http://$(hostname -I | awk '{print $1}'):8000/health
          
          ECR Repository:
          ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/vibeshift-musicgen
          EOF
          
          chown ubuntu:ubuntu /tmp/DEPLOYMENT_NOTES.txt
      Tags:
        - Key: Name
          Value: !Sub 'vibeshift-api-${EnvironmentName}'
        - Key: Environment
          Value: !Ref EnvironmentName

  # ─────────────────────────────────────────────────────────────────────────
  # S3 Bucket for Audio Files
  # ─────────────────────────────────────────────────────────────────────────

  VibeShiftBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'vibeshift-audio-${AWS::AccountId}-${EnvironmentName}'
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
          - Id: DeleteOutputs30Days
            Status: Enabled
            Prefix: outputs/
            ExpirationInDays: 30
      Tags:
        - Key: Name
          Value: !Sub 'vibeshift-bucket-${EnvironmentName}'

  # ─────────────────────────────────────────────────────────────────────────
  # CloudWatch Alarms
  # ─────────────────────────────────────────────────────────────────────────

  InstanceStatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: Alert when EC2 instance status check fails
      MetricName: StatusCheckFailed
      Namespace: AWS/EC2
      Statistic: Minimum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Ref VibeShiftAPI

  # ─────────────────────────────────────────────────────────────────────────
  # CloudWatch Log Group
  # ─────────────────────────────────────────────────────────────────────────

  APILogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/vibeshift-${EnvironmentName}'
      RetentionInDays: 30

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref VibeShiftAPI
  
  InstancePublicIP:
    Description: EC2 Instance Public IP
    Value: !GetAtt VibeShiftAPI.PublicIp
  
  InstancePrivateIP:
    Description: EC2 Instance Private IP
    Value: !GetAtt VibeShiftAPI.PrivateIp
  
  APIEndpoint:
    Description: API Endpoint (after container is running)
    Value: !Sub 'http://${VibeShiftAPI.PublicIp}:8000'
  
  S3Bucket:
    Description: S3 Bucket for audio files
    Value: !Ref VibeShiftBucket
  
  SecurityGroupId:
    Description: Security Group ID
    Value: !Ref APISecurityGroup
  
  SSHCommand:
    Description: SSH command to connect
    Value: !Sub 'ssh -i /path/to/key.pem ubuntu@${VibeShiftAPI.PublicIp}'

  ECRRepository:
    Description: ECR Repository URL
    Value: !Sub '${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/vibeshift-musicgen'
